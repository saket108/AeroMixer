name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip setuptools==69.5.1 wheel

         pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu

         # remove CLIP from lock file (install separately for reliability)
         sed '/CLIP.git/d' requirements_lock.txt > reqs.txt
         pip install -r reqs.txt

         # manual CLIP install (reliable method)
         git clone https://github.com/openai/CLIP.git
         cd CLIP
         python setup.py install
         cd ..

         # static quality tools
         pip install ruff==0.6.9 black==24.8.0


      - name: Lint and format gates
        run: |
          ruff check scripts tests train_net.py test_net.py demo_image.py preprocess/build_open_vocab.py --select F,E9
          black --check scripts/pipeline.py scripts/train_any_dataset.py scripts/validate_dataset.py scripts/inference_pipeline.py scripts/freeze_dataset_version.py scripts/build_tiled_yolo_dataset.py tests/test_pipeline_smoke.py tests/test_cli_help_smoke.py


      - name: Compile smoke check
        run: |
          python -m compileall alphaction preprocess scripts demo_image.py train_net.py test_net.py

      - name: Run smoke tests
        run: |
          python -m unittest discover -s tests -v
