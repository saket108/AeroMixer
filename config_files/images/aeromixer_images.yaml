DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "C:/Users/tsake/OneDrive/Desktop/one drive things/OneDrive/final dastaset for the project/merged_dataset"
  FRAME_DIR: ""
  # Use auto so loader can pick YOLO now; switch to custom_json once split JSON files are placed under
  # <PATH_TO_DATA_DIR>/json_splits or sibling json_splits.
  ANNOTATION_FORMAT: "auto"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aircraft']
  OPEN_VOCABULARY: False
  # Keep more spatial detail for small defects.
  TRAIN_MIN_SCALES: [512, 640]
  TEST_MIN_SCALES: [640]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False

  BACKBONE:
    # Finer patching improves thin-crack and small-defect sensitivity.
    CONV_BODY: "ViT-B/16"
    PATHWAYS: 1

  # ----------- IMPORTANT PART (Detection Mode) ----------
  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    # Optional decoder attention diagnostics (logs only, no optimization impact).
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: True
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0

    TEMPORAL_POINTS: 1

    # convert action detection → object detection
    ACTION_CLASSES: 6
    OBJECT_CLASSES: 6
    NUM_ACT: 6
    NUM_CLS: 6
    # Optional severity regression head (per query).
    PREDICT_SEVERITY: False
    SEVERITY_WEIGHT: 1.0
    CLASS_WEIGHTING: "inverse_freq"
    CLASS_WEIGHT_POWER: 1.0
    CLASS_WEIGHT_MIN: 0.25
    CLASS_WEIGHT_MAX: 4.0
    CLASS_WEIGHT_EMA: 0.9

SOLVER:
  MAX_EPOCH: 1
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002

DATALOADER:
  NUM_WORKERS: 4
  BALANCED_SAMPLING: True
  BALANCED_SAMPLING_POWER: 0.75
  BALANCED_SAMPLING_EMPTY_WEIGHT: 0.25

TEST:
  IMAGES_PER_BATCH: 16
  METRIC: 'image_ap'

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: True
  TRAIN_COLOR_BRIGHTNESS: 0.25
  TRAIN_COLOR_CONTRAST: 0.25
  TRAIN_COLOR_SATURATION: 0.25
  TRAIN_PCA_JITTER_ONLY: False
  TRAIN_PCA_JITTER_STD: 0.1
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aircraft_run"
