DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "C:/Users/tsake/OneDrive/Desktop/one drive things/OneDrive/final dastaset for the project/merged_dataset"
  FRAME_DIR: ""
  ANNOTATION_FORMAT: "auto"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aircraft']
  OPEN_VOCABULARY: False
  # Lite scales for faster CPU/low-memory training.
  TRAIN_MIN_SCALES: [256]
  TEST_MIN_SCALES: [256]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False

  BACKBONE:
    # Lighter than ViT-B/16 for quicker experimentation.
    CONV_BODY: "ViT-B/32"
    PATHWAYS: 1

  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: False
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0
    TEMPORAL_POINTS: 1

    # Smaller decoder footprint.
    NUM_QUERIES: 30
    NUM_STAGES: 2
    DIM_FEEDFORWARD: 1024

    ACTION_CLASSES: 6
    OBJECT_CLASSES: 6
    NUM_ACT: 6
    NUM_CLS: 6
    PREDICT_SEVERITY: False
    SEVERITY_WEIGHT: 1.0

SOLVER:
  MAX_EPOCH: 1
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002

DATALOADER:
  NUM_WORKERS: 0

TEST:
  IMAGES_PER_BATCH: 8
  METRIC: 'image_ap'

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: False
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aircraft_run_lite"
