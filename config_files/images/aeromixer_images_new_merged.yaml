# New merged dataset (YOLO layout).
# JSON split metadata exists at:
# C:/Users/tsake/OneDrive/Desktop/full dataset/json_splits/aircraft_damage_train.json
# C:/Users/tsake/OneDrive/Desktop/full dataset/json_splits/aircraft_damage_valid.json
# C:/Users/tsake/OneDrive/Desktop/full dataset/json_splits/aircraft_damage_test.json
#
# This config uses AeroMixer's native custom nested JSON adapter.
DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "C:/Users/tsake/OneDrive/Desktop/full dataset/merged_dataset"
  FRAME_DIR: ""
  ANNOTATION_FORMAT: "custom_json"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aircraft']
  OPEN_VOCABULARY: False
  TRAIN_MIN_SCALES: [512, 640]
  TEST_MIN_SCALES: [640]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False

  BACKBONE:
    CONV_BODY: "ViT-B/16"
    PATHWAYS: 1

  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: True
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0

    TEMPORAL_POINTS: 1

    ACTION_CLASSES: 6
    OBJECT_CLASSES: 6
    NUM_ACT: 6
    NUM_CLS: 6
    PREDICT_SEVERITY: True
    SEVERITY_WEIGHT: 1.0

SOLVER:
  MAX_EPOCH: 1
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002

TEST:
  IMAGES_PER_BATCH: 16
  METRIC: 'image_ap'

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: False
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aircraft_full_run"
