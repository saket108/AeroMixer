DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "C:/Users/tsake/OneDrive/Desktop/datasets/Aero_dataset"
  FRAME_DIR: ""
  # Use auto so loader can pick YOLO now; switch to custom_json once split JSON files are placed under
  # <PATH_TO_DATA_DIR>/json_splits or sibling json_splits.
  ANNOTATION_FORMAT: "auto"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aero_dataset']
  OPEN_VOCABULARY: False
  MULTIMODAL: True
  # Keep more spatial detail for small defects.
  TRAIN_MIN_SCALES: [512, 640]
  TEST_MIN_SCALES: [640]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False
  TEXT_ENCODER: "LITE_TEXT"

  BACKBONE:
    # Default balanced AeroLite variant for image+text detection.
    CONV_BODY: "AeroLite-Det-S"
    PATHWAYS: 1
    TORCHVISION_NAME: "auto"
    VISUAL_PRETRAINED: True
    FREEZE_PRETRAINED_VISUAL: False

  LITE_TEXT:
    EMBED_DIM: 256
    MAX_TOKENS: 12
    MAX_VARIANTS: 4
    CONTEXT_TOKENS: 4
    VOCAB_SIZE: 4096
    NUM_LAYERS: 2
    NUM_HEADS: 4
    FFN_DIM: 512
    DROPOUT: 0.0

  # ----------- IMPORTANT PART (Detection Mode) ----------
  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    # Optional decoder attention diagnostics (logs only, no optimization impact).
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: True
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0

    TEMPORAL_POINTS: 1

    # Class counts are auto-synced from the dataset at runtime.
    # Optional severity regression head (per query).
    PREDICT_SEVERITY: False
    SEVERITY_WEIGHT: 1.0
    CLASS_WEIGHTING: "inverse_freq"
    CLASS_WEIGHT_POWER: 1.0
    CLASS_WEIGHT_MIN: 0.25
    CLASS_WEIGHT_MAX: 4.0
    CLASS_WEIGHT_EMA: 0.9
    SCORE_THRESHOLD: 0.05
    TEXT_SCORE_FUSION: True
    TEXT_SCORE_FUSION_ALPHA: 0.40
    TEXT_LOGIT_SCALE: 12.0
    TEXT_QUERY_COND: True
    TEXT_QUERY_COND_SCALE: 0.20
    PROTOTYPE_MEMORY: False
    CLASS_PARTITION_QUERIES: False
    SCALE_TEXT_ROUTING: False
    PROMPT_ADAPTIVE_QUERIES: False
    TILE_GLOBAL_CONTEXT: False
    CROSS_TILE_CONSISTENCY: False
    DESCRIPTION_ALIGNMENT: False

SOLVER:
  MAX_EPOCH: 12
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002
  LOG_ITERATION_UPDATES: False
  LOG_ITERATION_EVERY: 20

DATALOADER:
  NUM_WORKERS: 4
  TILE_GROUP_BATCHING: False
  BALANCED_SAMPLING: False
  BALANCED_SAMPLING_POWER: 0.75
  BALANCED_SAMPLING_EMPTY_WEIGHT: 0.25

TEST:
  IMAGES_PER_BATCH: 16
  METRIC: 'image_ap'
  REPORT_AP5095: True
  AP5095_MIN: 0.5
  AP5095_MAX: 0.95
  AP5095_STEP: 0.05

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: True
  TRAIN_COLOR_BRIGHTNESS: 0.25
  TRAIN_COLOR_CONTRAST: 0.25
  TRAIN_COLOR_SATURATION: 0.25
  TRAIN_PCA_JITTER_ONLY: False
  TRAIN_PCA_JITTER_STD: 0.1
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aero_dataset_run"
