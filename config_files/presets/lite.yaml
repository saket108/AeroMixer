DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "C:/Users/tsake/OneDrive/Desktop/datasets/Aero_dataset"
  FRAME_DIR: ""
  ANNOTATION_FORMAT: "auto"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aero_dataset']
  OPEN_VOCABULARY: False
  MULTIMODAL: True
  # Lite scales for faster CPU/low-memory training.
  TRAIN_MIN_SCALES: [256]
  TEST_MIN_SCALES: [256]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False
  TEXT_ENCODER: "LITE_TEXT"

  BACKBONE:
    CONV_BODY: "AeroLite-Det-T"
    PATHWAYS: 1

  LITE_TEXT:
    EMBED_DIM: 256
    MAX_TOKENS: 12
    MAX_VARIANTS: 4
    CONTEXT_TOKENS: 4
    VOCAB_SIZE: 4096
    NUM_LAYERS: 1
    NUM_HEADS: 4
    FFN_DIM: 384
    DROPOUT: 0.0

  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: False
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0
    TEMPORAL_POINTS: 1

    # Smaller decoder footprint.
    NUM_QUERIES: 30
    NUM_STAGES: 2
    DIM_FEEDFORWARD: 1024

    # Class counts are auto-synced from the dataset at runtime.
    PREDICT_SEVERITY: False
    SEVERITY_WEIGHT: 1.0
    SCORE_THRESHOLD: 0.05
    TEXT_SCORE_FUSION: True
    TEXT_SCORE_FUSION_ALPHA: 0.30
    TEXT_LOGIT_SCALE: 10.0
    TEXT_QUERY_COND: True
    TEXT_QUERY_COND_SCALE: 0.15
    PROTOTYPE_MEMORY: True
    PROTOTYPE_MEMORY_BLEND: 0.25
    PROTOTYPE_MEMORY_CONTEXT_BLEND: 0.20
    CLASS_PARTITION_QUERIES: True
    CLASS_PARTITION_QUERY_RATIO: 0.15
    CLASS_PARTITION_TOPK: 2
    CLASS_PARTITION_SCALE: 0.25
    SCALE_TEXT_ROUTING: True
    SCALE_TEXT_ROUTING_HIDDEN: 96
    SCALE_TEXT_ROUTING_GAIN: 0.50
    PROMPT_ADAPTIVE_QUERIES: True
    PROMPT_ADAPTIVE_QUERY_RATIO: 0.20
    PROMPT_ADAPTIVE_QUERY_SCALE: 0.25
    TILE_GLOBAL_CONTEXT: True
    TILE_GLOBAL_CONTEXT_HIDDEN: 96
    TILE_GLOBAL_CONTEXT_BLEND: 0.15
    TILE_GLOBAL_CONTEXT_QUERY_SCALE: 0.15
    TILE_GLOBAL_CONTEXT_LEVEL_GAIN: 0.25
    CROSS_TILE_CONSISTENCY: True
    CROSS_TILE_CONSISTENCY_WEIGHT: 0.10
    CROSS_TILE_CONSISTENCY_TOPK: 8
    CROSS_TILE_CONSISTENCY_MIN_SCORE: 0.08
    CROSS_TILE_CONSISTENCY_IOU: 0.15
    DESCRIPTION_ALIGNMENT: True
    DESCRIPTION_ALIGNMENT_WEIGHT: 0.08
    DESCRIPTION_ALIGNMENT_MARGIN: 0.10

SOLVER:
  MAX_EPOCH: 1
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002

DATALOADER:
  NUM_WORKERS: 0
  TILE_GROUP_BATCHING: True

TEST:
  IMAGES_PER_BATCH: 8
  METRIC: 'image_ap'

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: False
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aero_dataset_run_lite"
