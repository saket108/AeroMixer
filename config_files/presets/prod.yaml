DATA:
  INPUT_TYPE: "image"
  PATH_TO_DATA_DIR: "data/Aero_dataset"
  FRAME_DIR: ""
  ANNOTATION_FORMAT: "auto"
  NUM_FRAMES: 1
  SAMPLING_RATE: 1
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  DATASETS: ['aero_dataset']
  OPEN_VOCABULARY: False
  MULTIMODAL: True
  TRAIN_MIN_SCALES: [512, 640]
  TEST_MIN_SCALES: [640]

MODEL:
  MULTI_LABEL_ACTION: False
  PRE_EXTRACT_FEAT: False
  TEXT_ENCODER: "LITE_TEXT"

  BACKBONE:
    CONV_BODY: "AeroLite-Det-B"
    PATHWAYS: 1

  LITE_TEXT:
    EMBED_DIM: 256
    MAX_TOKENS: 12
    MAX_VARIANTS: 4
    CONTEXT_TOKENS: 4
    VOCAB_SIZE: 4096
    NUM_LAYERS: 2
    NUM_HEADS: 4
    FFN_DIM: 512
    DROPOUT: 0.0

  STM:
    QUERY_INIT_MODE: "learnable_anchors"
    QUERY_INIT_SMALL_OBJECT_BIAS: True
    ATTN_TELEMETRY: False
    ATTN_TELEMETRY_STAGEWISE: False
    ATTN_TELEMETRY_COMPARE_NOMASK: False
    IOF_TAU_MODE: "learned"
    IOF_TAU_FIXED: 0.0
    IOF_TAU_CLAMP_MIN: 0.0
    IOF_TAU_CLAMP_MAX: 4.0
    TEMPORAL_POINTS: 1

    # Production profile: keep capacity but avoid over-heavy default.
    NUM_QUERIES: 100
    NUM_STAGES: 4
    DIM_FEEDFORWARD: 2048

    ACTION_CLASSES: 6
    OBJECT_CLASSES: 6
    NUM_ACT: 6
    NUM_CLS: 6
    PREDICT_SEVERITY: False
    SEVERITY_WEIGHT: 1.0
    CLASS_WEIGHTING: "inverse_freq"
    CLASS_WEIGHT_POWER: 1.0
    CLASS_WEIGHT_MIN: 0.25
    CLASS_WEIGHT_MAX: 4.0
    CLASS_WEIGHT_EMA: 0.9
    SCORE_THRESHOLD: 0.05
    TEXT_SCORE_FUSION: True
    TEXT_SCORE_FUSION_ALPHA: 0.40
    TEXT_LOGIT_SCALE: 12.0
    TEXT_QUERY_COND: True
    TEXT_QUERY_COND_SCALE: 0.20
    PROTOTYPE_MEMORY: True
    PROTOTYPE_MEMORY_BLEND: 0.35
    PROTOTYPE_MEMORY_CONTEXT_BLEND: 0.25
    CLASS_PARTITION_QUERIES: True
    CLASS_PARTITION_QUERY_RATIO: 0.20
    CLASS_PARTITION_TOPK: 3
    CLASS_PARTITION_SCALE: 0.30
    SCALE_TEXT_ROUTING: True
    SCALE_TEXT_ROUTING_HIDDEN: 128
    SCALE_TEXT_ROUTING_GAIN: 0.75
    PROMPT_ADAPTIVE_QUERIES: True
    PROMPT_ADAPTIVE_QUERY_RATIO: 0.30
    PROMPT_ADAPTIVE_QUERY_SCALE: 0.35
    TILE_GLOBAL_CONTEXT: True
    TILE_GLOBAL_CONTEXT_HIDDEN: 128
    TILE_GLOBAL_CONTEXT_BLEND: 0.20
    TILE_GLOBAL_CONTEXT_QUERY_SCALE: 0.20
    TILE_GLOBAL_CONTEXT_LEVEL_GAIN: 0.35
    CROSS_TILE_CONSISTENCY: True
    CROSS_TILE_CONSISTENCY_WEIGHT: 0.20
    CROSS_TILE_CONSISTENCY_TOPK: 12
    CROSS_TILE_CONSISTENCY_MIN_SCORE: 0.10
    CROSS_TILE_CONSISTENCY_IOU: 0.20

SOLVER:
  MAX_EPOCH: 10
  IMAGES_PER_BATCH: 4
  BASE_LR: 0.0002

DATALOADER:
  NUM_WORKERS: 2
  BALANCED_SAMPLING: False
  TILE_GROUP_BATCHING: True

TEST:
  IMAGES_PER_BATCH: 16
  METRIC: 'image_ap'
  REPORT_AP5095: True
  AP5095_MIN: 0.5
  AP5095_MAX: 0.95
  AP5095_STEP: 0.05

IMAGES:
  BGR: False
  TRAIN_USE_COLOR_AUGMENTATION: True
  TRAIN_COLOR_BRIGHTNESS: 0.25
  TRAIN_COLOR_CONTRAST: 0.25
  TRAIN_COLOR_SATURATION: 0.25
  TRAIN_PCA_JITTER_ONLY: False
  TRAIN_PCA_JITTER_STD: 0.1
  TEST_FORCE_FLIP: False
  VOCAB_FILE: ""
  VOCAB_OPEN_FILE: ""

OUTPUT_DIR: "output/aero_dataset_prod_run"
